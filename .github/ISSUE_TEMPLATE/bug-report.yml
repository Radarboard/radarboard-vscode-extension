name: Bug report
description: Report a problem with the Radarboard VS Code extension.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact command or VS Code action sequence.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, VS Code version, Node version, pnpm version, and radarboard-extension CLI path.
    validations:
      required: true
